id: password-reset-lockout
description: User password reset and account lockout recovery
match:
  keywords: [password, reset, locked, lockout, "can't login", "can't log in", "login failed", "account locked"]
  os: null

escalation:
  L1:
    intent: |
      Help user verify identity. Check account status (locked, disabled,
      expired password). Confirm password reset is needed. Provide guidance on
      self-service password reset portal. Read-only diagnostic only.
    tools:
      - check_account_status
      - list_user_groups

  L2:
    intent: |
      In addition to L1: reset password to temporary value after identity
      verification. Unlock account if locked. Verify MFA is enabled.
      Confirm user can log in.
    tools:
      - check_account_status
      - list_user_groups
      - reset_password
      - unlock_user_account
      - verify_mfa_setup

  L3:
    intent: |
      Deep access: force password reset, invalidate sessions/tokens,
      disable MFA temporarily if needed. Escalate suspicious lockout patterns
      to security team. Requires approval.
    tools:
      - "*"
    requires_human_approval: true
